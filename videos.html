<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Other Madeleine Forte Videos</title>
  <style>
    :root {
      --bg:       #201618;
      --bg2:      #2a1e1a;
      --bg3:      #342520;
      --text:     #ffffff;
      --gold:     #ffd700;
      --gold-dim: #b89a00;
      --tan:      #deb887;
      --blue:     #1e90ff;
      --border:   #4a3028;
      --hover:    #3d2820;
      --active:   #4a3020;
      --font:     Arial, Helvetica, Geneva, Swiss, SunSans-Regular, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
    }

    #layout {
      display: flex;
      height: 100vh;
      max-width: 1000px;
      border-right: 1px solid var(--border);
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 320px;
      flex-shrink: 0;
      height: 100%;
      border-right: 1px solid var(--border);
      background: var(--bg2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #page-heading {
      padding: 12px 12px 10px 12px;
      color: var(--gold);
      font-weight: bold;
      font-size: 1rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      text-align: center;
    }

    #sidebar-list {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    #sidebar-list::-webkit-scrollbar { width: 9px; }
    #sidebar-list::-webkit-scrollbar-track { background: var(--bg2); }
    #sidebar-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
    #sidebar-list::-webkit-scrollbar-thumb:hover { background: #6a4838; }

    #sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--tan);
      text-align: center;
      line-height: 1.4;
      flex-shrink: 0;
    }

    #sidebar-footer a { color: var(--gold); }
    #sidebar-footer a:visited { color: #ff4500; }

    .video-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }

    .video-item:hover { background: var(--hover); }
    .video-item.active { background: var(--active); border-left: 3px solid var(--gold); padding-left: 9px; }

    .video-num {
      color: var(--gold-dim);
      font-size: 0.6875rem;
      min-width: 18px;
      padding-top: 2px;
      flex-shrink: 0;
    }

    .video-title {
      font-size: 0.75rem;
      line-height: 1.4;
      color: var(--tan);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .video-item.active .video-title { color: var(--text); -webkit-line-clamp: unset; }
    .video-item:hover .video-title { color: var(--text); -webkit-line-clamp: unset; }

    /* ── Player ── */
    #player-area {
      flex: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg3);
      position: relative;
      overflow: hidden;
    }

    #back-link {
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 0.75rem;
    }

    #back-link a { color: var(--gold-dim); text-decoration: none; }
    #back-link a:hover { color: var(--gold); }
    #back-link a:visited { color: #ff4500; }

    #player-content {
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #player-title {
      color: var(--gold);
      font-size: 1.25rem;
      font-weight: bold;
      text-align: center;
      margin-bottom: 20px;
      line-height: 1.4;
      width: 100%;
      text-wrap: balance;
    }

    #player-wrapper {
      width: 100%;
      border: 1px solid var(--border);
    }

    #player-wrapper iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 0;
      display: block;
    }

    #player-placeholder {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--tan);
      font-size: 0.875rem;
    }

  </style>
</head>
<body>

<div id="layout">
  <div id="sidebar">
    <div id="page-heading">Other Madeleine Forte Videos</div>
    <div id="sidebar-list"></div>
    <div id="sidebar-footer">
      There are several older videos only available on YouTube. <a href="https://www.youtube.com/playlist?list=PLtO3TPgASyIBMT4EicplqmUl16Syl1o6Y">Click here to view a longer playlist.</a>
    </div>
  </div>
  <div id="player-area">
    <div id="back-link"><a href="recordings.html">&larr; Back to Recordings</a></div>
    <div id="player-content">
      <div id="player-title"></div>
      <div id="player-placeholder">Select a video from the list</div>
      <div id="player-wrapper" style="display:none;">
        <iframe id="yt-player" src="" title="YouTube video player"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen></iframe>
      </div>
    </div>
  </div>
</div>

<script>
  const videos = [
    { id: "KtSjORjDd6I", title: "James Greening-Valenzuela, violin, and Madeleine Forte, piano 1997 at Boise State University" },
    { id: "8hWtezuaWHo", title: "International Music Festival \u2013 Day 4 \u2013 The Lillibridge Ensemble \u2013 Live at Evergreen Woods 2025/10/03" },
    { id: "b9SSj2M28z0", title: "The Lillibridge Ensemble \u2013 Debussy Sonata for violin and piano" },
    { id: "Xs8w9ufUk74", title: "Madeleine Forte & J\u00e1nos K\u00e9ry \u2013 Manuel de Falla, Spanish Dance No.\u00a01 from La vida breve" },
    { id: "BtdDcuG_YZo", title: "Madeleine Forte \u2013 Chopin, Nocturne in F Major, Op.\u00a015, No.\u00a01" },
    { id: "PTeS0oGZd7s", title: "Madeleine Forte \u2013 Matthew Bengtson, A la mani\u00e8re de Ravel" },
    { id: "7VwyssVxuY0", title: "The Lillibridge Ensemble \u2013 Schumann Violin Sonata No\u00a01 in A minor" },
    { id: "kN8FqxMxaY4", title: "Madeleine Hsu Forte, Recital at the Ferenc Liszt Conservatory, Debrecen, Hungary, 1996" },
    { id: "3_vvuFMLwAE", title: "Liszt, Etude after Paganini #4 in E Major, with and without pedal, by Madeleine Forte" },
    { id: "nm7D6Zc4AUY", title: "Liszt, Etude after Paganini #4 in E Major, by Madeleine Forte" },
    { id: "rP8Eo-sWlUM", title: "The Lillibridge Ensemble \u2013 Madeleine Hsu Forte and Del Parkinson; Live at MCPA: 1986 & 1988" },
    { id: "1pBdhHXFp8s", title: "The Lillibridge Ensemble \u2013 Brahms Sonata in D minor for Violin and Piano" },
    { id: "nNnRHvqPJbc", title: "The Lillibridge Ensemble \u2014 Dvo\u0159\u00e1k Piano Quintet No.\u00a02 \u2014 Live at Evergreen Woods" },
    { id: "zbCv0qz3DRg", title: "The Bel-\u00catre Duo \u2013 Rachmaninoff Cello Sonata in G minor Op.\u00a019 (excerpt) \u2013 May 5, 2019" },
    { id: "d-FC86KPlW0", title: "Forte/Ryger \u2013 Brahms Violin Sonata no.\u00a03 in D minor \u2013 Nov 17, 2024" },
    { id: "z46Vfurx8s4", title: "Forte/Ryger \u2013 Brahms Violin Sonata no.\u00a03 in D minor, op.\u00a0108, II. Adagio" },
    { id: "HXQFbRb-uAk", title: "Madeleine Forte\u2019s 86th Birthday \u2013 Performance Excerpts Part II" },
    { id: "jDHXrCbJKEU", title: "Madeleine Forte\u2019s 86th Birthday \u2013 Performance Excerpts Part I" },
    { id: "5hvGzG3VygM", title: "The Lillibridge Ensemble \u2013 Live at Klavierhaus \u2013 April 7, 2024" },
    { id: "RnQqP_RyCYc", title: "Chopin Nocturne in C Minor Opus 48 no.\u00a01 \u2014 Dec 31, 2023" },
    { id: "75wUqG6Dy9E", title: "The Lillibridge Ensemble \u2013 Live at The Klavierhaus International Music Festival" },
    { id: "GLg4AlYSggA", title: "Ravel, Gaspard de la nuit: Scarbo M.\u00a055, by Madeleine Forte, December 2022" },
    { id: "euaMdm5kHO0", title: "Violin and Piano Recital" },
    { id: "9wbC9jua098", title: "Live at Yale University" },
    { id: "wpX6zpkNUUk", title: "A Second Try \u2014 February 18, 2022, by Madeleine Forte" },
    { id: "OnbVNIugD34", title: "Chopin, \u00c9tude Opus 25 No.\u00a08 in D Major, by Madeleine Forte" },
    { id: "rpMM4fjZlb4", title: "Madeleine Forte \u2013 Early Piano Recordings, Paris (1963\u201364)" },
    { id: "HIzm0Jcvw2A", title: "Madeleine Forte \u2013 Santa Fe Festival Recital (2004)" },
    { id: "TpyzahbIy8Q", title: "Madeleine Hsu Forte and Istv\u00e1n N\u00e1das - Duo Piano - 1980 (Remastered Audio)" },
    { id: "WR5keY_5YSU", title: "Madeleine Hsu Forte and Del Parkinson - Duo Piano April 12, 1990" },
    { id: "AB8Sj2vp4yY", title: "Franz Liszt\u2019s Settings of Petrarch Sonnets - Music Theory Lecture" },
    { id: "Basr0ybzbRs", title: "Liszt-Sonetto del Petrarca 123" },
    { id: "lwr7T2kT0kE", title: "Barber Piano Sonata: Movements 1 and 2" },
    { id: "QeUP_Cnl0ZY", title: "Barber Piano Sonata: Movements 3 and 4" },
  ];

  const sidebar     = document.getElementById('sidebar-list');
  const player      = document.getElementById('yt-player');
  const titleEl     = document.getElementById('player-title');
  const wrapper     = document.getElementById('player-wrapper');
  const placeholder = document.getElementById('player-placeholder');
  let current       = -1;

  function loadVideo(index) {
    if (current === index) return;
    if (current >= 0) sidebar.children[current].classList.remove('active');
    current = index;
    const v = videos[index];
    placeholder.style.display = 'none';
    wrapper.style.display = 'block';
    player.src = 'https://www.youtube.com/embed/' + v.id + '?autoplay=1';
    titleEl.textContent = v.title;
    sidebar.children[index].classList.add('active');
    sidebar.children[index].scrollIntoView({ block: 'nearest' });
  }

  videos.forEach(function(v, i) {
    const item = document.createElement('div');
    item.className = 'video-item';
    item.innerHTML = '<span class="video-num">' + (i + 1) + '</span><span class="video-title">' + v.title + '</span>';
    item.addEventListener('click', function() { loadVideo(i); });
    sidebar.appendChild(item);
  });

  // Redirect all wheel events to the sidebar list regardless of cursor position
  document.addEventListener('wheel', function(e) {
    var list = document.getElementById('sidebar-list');
    list.scrollTop += e.deltaY;
    e.preventDefault();
  }, { passive: false });
</script>

</body>
</html>
